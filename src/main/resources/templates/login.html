<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>
    <div class="container">
        <div class="login-card">

            <!-- Success message after logout -->
            <div th:if="${param.logout}" class="alert alert-success">
                <span>&#10003; User successfully logged out</span>
            </div>

            <!-- Error message on invalid credentials -->
            <div th:if="${param.error}" class="alert alert-error">
                <span>&#10007; Invalid username or password</span>
            </div>

            <!-- Google OAuth2 Sign-In -->
            <a href="/oauth2/authorization/google" class="google-btn">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                <span>Sign in with Google</span>
            </a>

            <!-- Divider between login methods -->
            <div class="divider"><span>or</span></div>

            <!-- Form-based login (username: admin, password: admin) -->
            <form th:action="@{/login}" method="post" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required autofocus />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required />
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember-me" />
                        <span>Remember Me</span>
                    </label>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">Log In</button>
                    <button type="reset" class="btn btn-cancel">Cancel</button>
                </div>
            </form>

            <p class="footer-text">Secured by Spring Security &amp; Google OAuth2</p>
        </div>
    </div>
</body>

</html>
